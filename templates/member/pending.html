<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>드론 소방 관제 시스템</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="{{ url_for('static', filename='css/base.css') }}" rel="stylesheet">
</head>
<body class="bg-dark text-light d-flex flex-column min-vh-100">

    {% include 'include/header.html' %}

    <main class="container my-auto py-5 text-center" id="pending-container">
        <div class="row justify-content-center">
            <div class="col-lg-6 col-md-9">
                <article class="card card-glass p-5" id="pending-card">
                    <div class="pending-icon mb-4">
                        <span style="font-size: 4rem;">⏳</span>
                    </div>
                    {% if just_registered %}
                        <h1 class="h3 fw-bold text-warning mb-3" id="pending-title">회원 등록이 완료되었습니다</h1>
                        <p class="text-muted mb-4" id="pending-desc">
                            관리자의 승인 후 시스템을 이용할 수 있습니다.<br>
                            승인이 완료되면 로그인하여 관제 시스템에 접속하세요.
                        </p>
                    {% else %}
                        <h1 class="h3 fw-bold text-warning mb-3" id="pending-title">접근 권한이 없습니다</h1>
                        <p class="text-muted mb-4" id="pending-desc">
                            관리자의 승인이 완료되지 않은 계정입니다.<br>
                            승인 후 다시 로그인해 주세요.
                        </p>
                    {% endif %}
                    <hr class="border-secondary my-3">
                    <div class="d-flex justify-content-center gap-3">
                        <a href="/member/signin_form" class="btn btn-danger px-4" id="btn-pending-login">로그인 페이지로</a>
                    </div>
                </article>
            </div>
        </div>
    </main>

    {% include 'include/footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
