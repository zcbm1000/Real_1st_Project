<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>드론 소방 관제 시스템</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/nav.css">
  <link rel="stylesheet" href="/static/css/hud.css">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
{% include 'include/nav.html' %}

<main class="auth-page" id="modify-page">
  <div class="auth-card" id="modify-card">
    <h1 class="auth-title">정보 수정</h1>
    <p class="auth-subtitle">변경할 항목을 수정 후 저장하세요. ID는 변경이 불가합니다.</p>

    <div class="auth-success" id="modify-success"></div>
    <div class="auth-error"   id="modify-error"></div>

    <form id="modify-form" novalidate>
      <!-- ID (읽기전용) -->
      <div class="input-group">
        <span class="input-icon">👤</span>
        <input class="form-input" type="text" value="{{ member_id }}"
               readonly disabled id="display-id">
      </div>

      <!-- PW -->
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input class="form-input" type="password" id="mPw" name="mPw"
               placeholder="새 비밀번호 (변경 시 입력)">
      </div>

      <!-- Email -->
      <div class="input-group">
        <span class="input-icon">✉️</span>
        <input class="form-input" type="email" id="mEmail" name="mEmail"
               value="{{ member.email or '' }}" placeholder="E-MAIL">
      </div>

      <!-- Phone -->
      <div class="input-group">
        <span class="input-icon">📞</span>
        <input class="form-input" type="tel" id="mPhone" name="mPhone"
               value="{{ member.phone or '' }}" placeholder="PHONE">
      </div>

      <div class="form-actions" style="margin-top:28px;">
        <!-- 좌: 홈(로고 버튼) — 저장 없이 이동 -->
        <a href="/" class="btn btn-secondary" id="home-btn"
           style="display:flex; align-items:center; gap:6px; justify-content:center;">
          🔥 홈
        </a>
        <!-- 우: 변경하기 -->
        <button type="submit" class="btn btn-primary" id="save-btn">변경하기</button>
      </div>
    </form>
  </div>
</main>

<script>
document.getElementById('modify-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const successBox = document.getElementById('modify-success');
  const errorBox   = document.getElementById('modify-error');
  successBox.classList.remove('show');
  errorBox.classList.remove('show');

  const formData = new FormData(this);
  try {
    const res  = await fetch('/member/modify', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.success) {
      successBox.textContent = data.message || '정보가 변경되었습니다.';
      successBox.classList.add('show');
    } else {
      errorBox.textContent = data.message || '변경에 실패했습니다.';
      errorBox.classList.add('show');
    }
  } catch(err) {
    errorBox.textContent = '서버 오류가 발생했습니다.';
    errorBox.classList.add('show');
  }
});
</script>
</body>
</html>
