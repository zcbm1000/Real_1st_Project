<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>드론 소방 관제 시스템</title>
  <link rel="stylesheet" href="/static/css/base.css">
  <link rel="stylesheet" href="/static/css/nav.css">
  <link rel="stylesheet" href="/static/css/hud.css">
  <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body>
{% include 'include/nav.html' %}

<main class="auth-page" id="signin-page">
  <div class="auth-card" id="signin-card">
    <h1 class="auth-title">로그인 화면</h1>
    <p class="auth-subtitle">로그인 후 시스템을 이용할 수 있습니다.</p>

    <!-- 인라인 에러 박스 -->
    <div class="auth-error" id="login-error">
      ID 또는 PW가 일치하지않습니다.<br>다시 확인 후 시도해주세요.
    </div>

    <form id="login-form" novalidate>
      <div class="input-group">
        <span class="input-icon">👤</span>
        <input class="form-input" type="text" id="mId" name="mId"
               placeholder="ID를 입력하세요" required autocomplete="username">
      </div>
      <div class="input-group">
        <span class="input-icon">🔒</span>
        <input class="form-input" type="password" id="mPw" name="mPw"
               placeholder="PW를 입력하세요" required autocomplete="current-password">
      </div>

      <div class="form-actions">
        <button type="submit" class="btn btn-primary" id="login-submit-btn">
          로그인
        </button>
      </div>
    </form>

    <div class="form-links">
      <a href="/member/signup_form" class="form-link" id="goto-signup">회원가입</a>
      <span style="color:var(--border-mid);">|</span>
      <a href="/member/id_find_form" class="form-link" id="goto-find">ID 찾기</a>
      <a href="/member/pw_find_form" class="form-link" id="goto-finds">PW 찾기</a>
    </div>
  </div>
</main>

<script>
document.getElementById('login-form').addEventListener('submit', async function(e) {
  e.preventDefault();
  const errorBox = document.getElementById('login-error');
  errorBox.classList.remove('show');

  const formData = new FormData(this);
  try {
    const res  = await fetch('/member/signin', { method: 'POST', body: formData });
    const data = await res.json();
    if (data.success) {
      window.location.href = data.redirect;
    } else {
      errorBox.classList.add('show');
      document.getElementById('mPw').value = '';
      document.getElementById('mPw').focus();
    }
  } catch(err) {
    errorBox.classList.add('show');
  }
});
</script>
</body>
</html>
